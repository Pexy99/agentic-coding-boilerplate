name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  statuses: write

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check required workflow docs
        run: |
          set -euo pipefail
          test -f AGENTS.md
          test -f CONTRIBUTING.md
          test -f docs/workflow.md
          test -f docs/tech-stack.md
          test -f docs/product.md
          test -f docs/tracks.md
          test -f docs/tracks/_template/spec.md
          test -f docs/tracks/_template/plan.md

      - name: Lint Markdown and YAML
        uses: super-linter/super-linter/slim@v8.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: .
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_MARKDOWN: true
          VALIDATE_YAML: true
          VALIDATE_GITHUB_ACTIONS: true
          FILTER_REGEX_INCLUDE: .*\.(md|ya?ml)$
